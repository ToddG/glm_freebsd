name = "glm_freebsd"
version = "0.0.1"

description = "CLI tool to package a Gleam app as a FreeBSD package, with a service script."
licences = ["Apache-2.0"]
repository = { type = "github", user = "toddg", repo = "https://github.com/ToddG/glm_freebsd.git" }
# links = [{ title = "Website", href = "" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
yodel = ">= 2.0.1 and < 3.0.0"
clip = ">= 1.2.0 and < 2.0.0"
handles = ">= 5.0.0 and < 6.0.0"
argv = ">= 1.0.2 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
shellout = ">= 1.8.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
