[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"

[freebsd]
pkg_user =       "True"
pkg_username =   "MY_USER"
beam_path =      "BEAM_PATH"
conf_dir =       "/CONFIG"
config_dir =     "/CONFIG_DIR"
bin_path =       "BIN"
conf_dir_var =   "CONF_DIR_VAR"
daemon_flags =   "DAEMON_FLAGS"
env_file_name =  "ENV_FILE_NAME"
var_dir =        "VAR_DIR"
pkg_prefix =     "PKG_PREFIX"

